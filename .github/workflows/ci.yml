name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  client:
    name: Client — Type-check, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: server
      - run: npm ci
        working-directory: client
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        working-directory: client
      - name: Start server (MongoDB-less for smoke tests)
        run: |
          cd server && npm run build
          MONGO_URI=mongodb://localhost:27017/test JWT_SECRET=ci-secret node dist/index.js &
          sleep 4
      - run: npx playwright test
